<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background -->
  <rect width="300" height="300" fill="#0f1b3c"/>
  
  <!-- Outer circle border (Space Force/Military style) -->
  <circle cx="150" cy="150" r="135" fill="none" stroke="#1e88e5" stroke-width="3"/>
  <circle cx="150" cy="150" r="130" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.4"/>
  
  <!-- Main delta/arrowhead (pointed up) - larger and more detailed -->
  <path d="M 150,40 L 220,230 L 150,190 L 80,230 Z" fill="#1e88e5" stroke="#42a5f5" stroke-width="2"/>
  
  <!-- Inner accent arrowhead -->
  <path d="M 150,65 L 205,210 L 150,175 L 95,210 Z" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Center dot/star -->
  <circle cx="150" cy="150" r="8" fill="#42a5f5"/>
  <circle cx="150" cy="150" r="14" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>
  
  <!-- Side accent points (like USSF logo) -->
  <circle cx="100" cy="150" r="5" fill="#1f2937"/>
  <circle cx="200" cy="150" r="5" fill="#1f2937"/>
  
  <!-- Bottom horizontal line (military style) -->
  <line x1="110" y1="235" x2="190" y2="235" stroke="#1e88e5" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Small accent marks -->
  <line x1="135" y1="245" x2="135" y2="255" stroke="#42a5f5" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="245" x2="165" y2="255" stroke="#42a5f5" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Top detail (like command insignia) -->
  <line x1="150" y1="25" x2="150" y2="35" stroke="#42a5f5" stroke-width="2" stroke-linecap="round"/>
</svg>