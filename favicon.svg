<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#f5f5f5" rx="20"/>
  
  <!-- Star Trek arrowhead/delta symbol in blue -->
  <g transform="translate(50, 50)">
    <!-- Main delta/arrowhead shape -->
    <path d="M 0,-35 L 30,20 L -30,20 Z" fill="#1e88e5" stroke="none"/>
    
    <!-- Inner geometric accent (minimal) -->
    <circle cx="0" cy="-5" r="4" fill="#4a4a4a"/>
    
    <!-- Subtle horizontal line (minimalist detail) -->
    <line x1="-15" y1="8" x2="15" y2="8" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>