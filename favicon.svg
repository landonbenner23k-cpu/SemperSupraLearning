<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0f1b3c" rx="20"/>
  
  <!-- Outer circle border (Space Force/Military style) -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#42a5f5" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Main delta/arrowhead (pointed up) -->
  <path d="M 50,20 L 75,70 L 50,60 L 25,70 Z" fill="#1e88e5" stroke="#42a5f5" stroke-width="1.5"/>
  
  <!-- Inner accent arrowhead -->
  <path d="M 50,28 L 68,62 L 50,55 L 32,62 Z" fill="none" stroke="#42a5f5" stroke-width="1"/>
  
  <!-- Center dot/star -->
  <circle cx="50" cy="50" r="3.5" fill="#42a5f5"/>
  <circle cx="50" cy="50" r="5.5" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
  
  <!-- Side accent points (like USSF logo) -->
  <circle cx="35" cy="50" r="2" fill="#1f2937"/>
  <circle cx="65" cy="50" r="2" fill="#1f2937"/>
  
  <!-- Bottom horizontal line (military style) -->
  <line x1="38" y1="72" x2="62" y2="72" stroke="#1e88e5" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Small accent marks -->
  <line x1="45" y1="78" x2="45" y2="80" stroke="#42a5f5" stroke-width="1" stroke-linecap="round"/>
  <line x1="55" y1="78" x2="55" y2="80" stroke="#42a5f5" stroke-width="1" stroke-linecap="round"/>
</svg>